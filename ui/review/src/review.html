<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Plan artifact review</title>
  <link rel="stylesheet" href="/pl-review/assets/review.css">
  <script defer src="/pl-review/assets/review.js"></script>
</head>
<body>
  <header>
    <div><strong>Plan artifact review</strong><span id="artifact"></span></div>
    <span id="status" role="status" aria-live="polite">Loading…</span>
  </header>
  <main>
    <section class="document-panel" aria-label="Artifact source">
      <div class="hint">Select one or more lines, then add an anchored comment.</div>
      <div id="document" class="document" role="listbox" aria-label="Artifact lines" aria-multiselectable="true"></div>
    </section>
    <aside>
      <section>
        <h2>Anchored comment</h2>
        <div id="selection" class="selection">No lines selected</div>
        <label for="comment">Comment</label>
        <textarea id="comment" maxlength="4000" rows="4" placeholder="What should change here?"></textarea>
        <button id="add-comment" type="button" disabled>Add comment</button>
      </section>
      <section>
        <h2>Review notes</h2>
        <div id="annotations" class="annotations"><p class="muted">No anchored comments.</p></div>
        <label for="feedback">Overall feedback</label>
        <textarea id="feedback" maxlength="4000" rows="5" placeholder="Optional summary"></textarea>
      </section>
      <div id="error" class="error" role="alert" hidden></div>
      <div class="decision-row">
        <button id="deny" type="button" class="deny">Request changes</button>
        <button id="approve" type="button" class="approve">Approve</button>
      </div>
    </aside>
  </main>
</body>
</html>
