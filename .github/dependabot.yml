version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:15"
      timezone: UTC
    groups:
      root-dependencies:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /ui/web
    schedule:
      interval: weekly
      day: monday
      time: "05:30"
      timezone: UTC
    groups:
      dashboard-dependencies:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:45"
      timezone: UTC
    groups:
      github-actions:
        patterns:
          - "*"
