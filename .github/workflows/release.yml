name: Release

# Publishes to npm. Trigger either by publishing a GitHub Release:
#   gh release create v0.1.0 --generate-notes
# or manually, passing the existing tag:
#   gh workflow run Release -f tag=v0.1.0
# The tag must match the package.json version, or the job fails before publishing.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to publish (e.g. v0.1.0)"
        required: true
        type: string

concurrency:
  group: release-${{ github.event.release.tag_name || github.event.inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Resolve release tag
        id: tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: echo "value=${RELEASE_TAG:-$INPUT_TAG}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.tag.outputs.value }}

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Install root dependencies
        run: npm ci

      - name: Install dashboard dependencies
        run: npm ci --prefix ui/web

      - name: Install Playwright Chromium
        run: cd ui/web && npx playwright install --with-deps chromium

      - name: Install just
        run: bash .github/scripts/install-just.sh

      - name: Verify tag matches package.json version
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.value }}
        run: |
          TAG="${RELEASE_TAG#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag $RELEASE_TAG does not match package.json version $PKG"
            exit 1
          fi
          echo "Releasing v$PKG"

      - name: Run release gates
        run: just ci

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
