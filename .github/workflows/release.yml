name: Release

# Publishes to npm. Trigger either by publishing a GitHub Release:
#   gh release create vX.Y.Z --generate-notes
# or manually, passing the existing tag:
#   gh workflow run Release -f tag=vX.Y.Z
# The tag must match the package.json version, or the job fails before publishing.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to publish (e.g. vX.Y.Z)"
        required: true
        type: string

concurrency:
  group: release-${{ github.event.release.tag_name || github.event.inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: write # attach SBOMs and dependency manifests to the GitHub Release
  id-token: write # npm trusted publishing and provenance

jobs:
  publish:
    environment: npm
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Resolve release tag
        id: tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          TAG="${RELEASE_TAG:-$INPUT_TAG}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Release tag must be a v-prefixed semantic version"
            exit 1
          fi
          printf 'value=%s\n' "$TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.tag.outputs.value }}

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install trusted-publishing-capable npm
        run: npm install --global npm@11.18.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Install root dependencies
        run: npm ci

      - name: Install dashboard dependencies
        run: npm ci --prefix ui/web

      - name: Install Playwright Chromium
        run: cd ui/web && npx playwright install --with-deps chromium

      - name: Install just
        run: bash .github/scripts/install-just.sh

      - name: Verify tag matches package.json version
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.value }}
        run: |
          TAG="${RELEASE_TAG#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag $RELEASE_TAG does not match package.json version $PKG"
            exit 1
          fi
          echo "Releasing v$PKG"

      - name: Verify GitHub Release notes
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.tag.outputs.value }}
        run: |
          NOTES="$(gh release view "$RELEASE_TAG" --json body --jq .body)"
          if [ -z "${NOTES//[[:space:]]/}" ]; then
            echo "::error::GitHub Release $RELEASE_TAG has no maintained release notes"
            exit 1
          fi

      - name: Run release gates
        run: just ci

      - name: Verify tagged release state
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.value }}
        run: just release-verify

      - name: Publish to npm with trusted publishing
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.value }}
        run: npm publish --provenance --access public

      - name: Generate release SBOMs and dependency manifest
        run: just release-artifacts

      - name: Attach release artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.tag.outputs.value }}
        run: gh release upload "$RELEASE_TAG" release-artifacts/* --clobber
