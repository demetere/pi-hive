name: OSV Scanner

on:
  pull_request:
    branches:
      - main
  merge_group:
    types:
      - checks_requested
  push:
    branches:
      - main
  schedule:
    - cron: "41 4 * * 1"

concurrency:
  group: osv-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  scan-full:
    if: github.event_name == 'push' || github.event_name == 'schedule'
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@a82132c0bd6c7261ffcb78e754c46c70ab57ad9a # v2.3.8
    with:
      scan-args: |-
        --include-git-root
        --recursive
        ./

  scan-pull-request:
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@a82132c0bd6c7261ffcb78e754c46c70ab57ad9a # v2.3.8
    with:
      scan-args: |-
        --include-git-root
        --recursive
        ./
